services:
  usermanagement-service:
    build:
      context: .
      dockerfile: userManagement/Dockerfile
    container_name: usermanagement-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_R2DBC_URL: ${SPRING_R2DBC_URL}
      SPRING_R2DBC_USERNAME: ${SPRING_R2DBC_USERNAME}
      SPRING_R2DBC_PASSWORD: ${SPRING_R2DBC_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      TZ: America/Bogota
      JAVA_OPTS: "-Xmx384m -Xms128m -Duser.timezone=America/Bogota"
    networks:
      - ubik-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  motel-management-service:
    build:
      context: .
      dockerfile: motelManegement/Dockerfile
    container_name: motel-management-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_R2DBC_URL: ${SPRING_R2DBC_URL}
      SPRING_R2DBC_USERNAME: ${SPRING_R2DBC_USERNAME}
      SPRING_R2DBC_PASSWORD: ${SPRING_R2DBC_PASSWORD}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      ROLE_ID_ADMIN: ${ROLE_ID_ADMIN}
      ROLE_ID_PROPERTY_OWNER: ${ROLE_ID_PROPERTY_OWNER}
      ROLE_ID_USER: ${ROLE_ID_USER}
      TZ: America/Bogota
      JAVA_OPTS: "-Xmx384m -Xms128m -Duser.timezone=America/Bogota"
    networks:
      - ubik-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  notification-service:
    build:
      context: .
      dockerfile: notificationService/Dockerfile
    container_name: notification-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      TZ: America/Bogota
      JAVA_OPTS: "-Xmx192m -Xms64m -Duser.timezone=America/Bogota"
    networks:
      - ubik-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  payment-service:
    build:
      context: .
      dockerfile: paymentService/Dockerfile
    container_name: payment-service
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_R2DBC_URL: ${SPRING_R2DBC_URL}
      SPRING_R2DBC_USERNAME: ${SPRING_R2DBC_USERNAME}
      SPRING_R2DBC_PASSWORD: ${SPRING_R2DBC_PASSWORD}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      MOTEL_MANAGEMENT_URL: ${MOTEL_MANAGEMENT_URL:-http://motel-management-service:8083}
      USER_MANAGEMENT_URL: ${USER_MANAGEMENT_URL:-http://usermanagement-service:8081}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL:-http://notification-service:8084}
      TZ: America/Bogota
      JAVA_OPTS: "-Xmx384m -Xms128m -Duser.timezone=America/Bogota"
    depends_on:
      motel-management-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    networks:
      - ubik-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8085/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  streak-service:
    build:
      context: .
      dockerfile: streakService/Dockerfile
    container_name: streak-service
    restart: unless-stopped
    ports:
      - "8087:8086"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_R2DBC_URL: ${SPRING_R2DBC_URL}
      SPRING_R2DBC_USERNAME: ${SPRING_R2DBC_USERNAME}
      SPRING_R2DBC_PASSWORD: ${SPRING_R2DBC_PASSWORD}
      ROLE_ID_ADMIN: ${ROLE_ID_ADMIN}
      TZ: America/Bogota
      JAVA_OPTS: "-Xmx192m -Xms64m -Duser.timezone=America/Bogota"
    depends_on:
      motel-management-service:
        condition: service_healthy
    networks:
      - ubik-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8086/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  ai-service:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    container_name: ai-service
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      GATEWAY_URL: http://gateway:8080
      JAVA_OPTS: "-Xmx384m -Xms128m"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ubik-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8088/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      ROLE_ID_ADMIN: ${ROLE_ID_ADMIN}
      ROLE_ID_PROPERTY_OWNER: ${ROLE_ID_PROPERTY_OWNER}
      ROLE_ID_USER: ${ROLE_ID_USER}
      FRONTEND_URL: ${FRONTEND_URL}
      TZ: America/Bogota
      JAVA_OPTS: "-Xmx384m -Xms128m -Duser.timezone=America/Bogota"
    depends_on:
      usermanagement-service:
        condition: service_healthy
      motel-management-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      streak-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - ubik-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: stripe-cli
    restart: unless-stopped
    environment:
      - STRIPE_API_KEY=${STRIPE_SECRET_KEY}
    command: >
      listen
      --forward-to http://gateway:8080/api/payments/webhook
      --skip-verify
      --log-level info
    networks:
      - ubik-network
    depends_on:
      gateway:
        condition: service_healthy

networks:
  ubik-network:
    name: ubik-network
    external: true
