app:
  roles:
    admin: ${ROLE_ID_ADMIN}
    property-owner: ${ROLE_ID_PROPERTY_OWNER}
server:
  port: 8083

spring:
  application:
    name: motel-management-service

  codec:
    max-in-memory-size: 10MB

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

services:
  user-management:
    url: http://usermanagement-service:8081


  # PostgreSQL R2DBC (valores inyectados desde .env o docker)
  r2dbc:
    url: ${SPRING_R2DBC_URL}
    username: ${SPRING_R2DBC_USERNAME}
    password: ${SPRING_R2DBC_PASSWORD}
    pool:
      initial-size: 5
      max-size: 15
      max-idle-time: 30m
      max-acquire-time: 3m

  # Inicialización de esquema
  # En Azure NO ejecutamos scripts automáticamente
  sql:
    init:
      mode: never

# Cloudinary Configuration
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

# Logging
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - traceId=%X{traceId} spanId=%X{spanId} - %msg%n"
  level:
    root: INFO
    org.springframework.r2dbc: DEBUG
    io.r2dbc.postgresql: DEBUG
    com.ubik.motelmanagement: DEBUG
    # Logging específico para debugging
    com.ubik.motelmanagement.infrastructure.adapter.in.web.controller: DEBUG
    com.ubik.motelmanagement.domain.service: DEBUG
    com.ubik.motelmanagement.infrastructure.adapter.out.persistence: DEBUG
    com.example: DEBUG

# CONFIGURACIÓN DE OBSERVABILIDAD (Actuator + Micrometer)
management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus,metrics"
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true   # Habilita /actuator/health/liveness y /readiness
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      service: motel-management
      environment: ${SPRING_PROFILES_ACTIVE:local}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.75, 0.95, 0.99
      slo:
        http.server.requests: 100ms, 500ms, 1s, 2s