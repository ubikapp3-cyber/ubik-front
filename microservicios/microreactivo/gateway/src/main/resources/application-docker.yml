server:
  port: 8080

spring:
  cloud:
    gateway: 
      globalcors:
        cors-configurations:
          '[/**]': 
            allowedOriginPatterns: "*"
            allowedMethods: 
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders:  "*"
            allowCredentials: true
            maxAge: 3600

      routes:
        # MICROSERVICIO userManagement (autenticación: login, register)
        - id: userManagement-auth
          uri: http://usermanagement:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        # MICROSERVICIO userManagement (datos del usuario)
        - id: userManagement-profile
          uri: http://usermanagement:8081
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=0
            - name: AuthorizationFilter

        # Products Service (si lo tienes)
        - id: products
          uri: http://products:8082
          predicates:
            - Path=/api/products/**
          filters:
            - StripPrefix=1
            - name: AuthorizationFilter

        # Motel Management - Motels
        - id: motel-management-motels
          uri: http://motel-management:8083
          predicates:
            - Path=/api/motels/**
          filters:
            - StripPrefix=0

        # Motel Management - Rooms
        - id: motel-management-rooms
          uri: http://motel-management:8083
          predicates:
            - Path=/api/rooms/**
          filters:
            - StripPrefix=0
            - name: AuthorizationFilter

        # Motel Management - Services
        - id: motel-management-services
          uri: http://motel-management:8083
          predicates:
            - Path=/api/services/**
          filters:
            - StripPrefix=0
            - name: AuthorizationFilter

        # Booking Service - Reservations
        - id: booking-service
          uri: http://motel-management:8083
          predicates:
            - Path=/api/bookings/**
          filters:
            - StripPrefix=0
            - name: AuthorizationFilter

      trusted-proxies: '127\.0\.0\.1|::1'

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

# Logging configuration
logging:
  level:
    com.example.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,gateway"
  endpoint:
    health:
      show-details: always
