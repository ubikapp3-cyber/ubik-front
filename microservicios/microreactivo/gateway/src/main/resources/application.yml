server:
  port: 8080

spring:
  cloud:
    gateway: 
      routes:
        # ✅ UserManagement - Auth (CORREGIDO: usermanagement-service)
        - id: userManagement-auth
          uri: http://usermanagement-service:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        # ✅ UserManagement - Profile (CORREGIDO: usermanagement-service)
        - id: userManagement-profile
          uri: http://usermanagement-service:8081
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=0

        # ✅ Motel Management - Motels (CORREGIDO: motel-management-service)
        - id: motel-management-motels
          uri: http://motel-management-service:8083
          predicates:
            - Path=/api/motels/**
          filters:
            - StripPrefix=0

        # ✅ NUEVO: Motel Management - Moteles del propietario autenticado
        - id: motel-management-auth-motels
          uri: http://motel-management-service:8083
          predicates:
            - Path=/api/auth/motels/**
          filters:
            - StripPrefix=0

        # ✅ Motel Management - Rooms
        - id: motel-management-rooms
          uri: http://motel-management-service:8083
          predicates:
            - Path=/api/rooms/**
          filters:
            - StripPrefix=0

        # ✅ Motel Management - Services
        - id: motel-management-services
          uri: http://motel-management-service:8083
          predicates:
            - Path=/api/services/**
          filters:
            - StripPrefix=0

        # ✅ Motel Management - Reservations
        - id: motel-reservations
          uri: http://motel-management-service:8083
          predicates:
            - Path=/api/reservations/**
          filters:
            - StripPrefix=0

      trusted-proxies: '127\.0\.0\.1|::1'

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

# Logging
logging:
  level:
    com.example.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,gateway"
  endpoint:
    health:
      show-details: always