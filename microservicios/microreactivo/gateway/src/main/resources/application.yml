spring:
  cloud:
    gateway:
      routes:
        # ✅ PRIMERO: Motel Management - Auth motels (MÁS ESPECÍFICA - debe ir antes de userManagement-auth)
        - id: motel-management-auth-motels
          uri: http://motel-management-service:8083
          predicates:
            - Path=/api/auth/motels/**
          filters:
            - StripPrefix=0

        # ✅ UserManagement - Auth (DESPUÉS de la ruta más específica)
        - id: userManagement-auth
          uri: http://usermanagement-service:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        # ✅ UserManagement - Profile
        - id: userManagement-profile
          uri: http://usermanagement-service:8081
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=0

        # ✅ Motel Management - Motels
        - id: motel-management-motels
          uri: http://motel-management-service:8083
          predicates:
            - Path=/api/motels/**
          filters:
            - StripPrefix=0

        # ✅ Motel Management - Rooms
        - id: motel-management-rooms
          uri: http://motel-management-service:8083
          predicates:
            - Path=/api/rooms/**
          filters:
            - StripPrefix=0

        # ✅ Motel Management - Services
        - id: motel-management-services
          uri: http://motel-management-service:8083
          predicates:
            - Path=/api/services/**
          filters:
            - StripPrefix=0

        # ✅ Motel Management - Reservations
        - id: motel-reservations
          uri: http://motel-management-service:8083
          predicates:
            - Path=/api/reservations/**
          filters:
            - StripPrefix=0

      trusted-proxies: '127\.0\.0\.1|::1'