spring:
  cloud:
    gateway:
      routes:
        # ═══════════════════════════════════════════════════════════
        # IMPORTANTE: Las rutas se evalúan en ORDEN
        # Las MÁS ESPECÍFICAS deben ir PRIMERO
        # ═══════════════════════════════════════════════════════════

        # ┌─────────────────────────────────────────────────────────┐
        # │ MOTEL MANAGEMENT - RUTAS AUTENTICADAS                   │
        # │ (Orden crítico: específica → general)                   │
        # └─────────────────────────────────────────────────────────┘

        # 1️⃣ RUTA MÁS ESPECÍFICA - /my-motels (exacta, sin variables)
        - id: motel-management-my-motels
          uri: http://motel-management-service:8083
          predicates:
            - Path=/api/auth/motels/my-motels
          filters:
            - StripPrefix=0
          metadata:
            description: "Moteles del usuario autenticado (sin userId en URL)"

        # 2️⃣ RUTA SEMI-ESPECÍFICA - /{userId} (con variable de path)
        - id: motel-management-auth-motels-userid
          uri: http://motel-management-service:8083
          predicates:
            - Path=/api/auth/motels/{userId}
          filters:
            - StripPrefix=0
          metadata:
            description: "Moteles de un usuario específico"

        # ┌─────────────────────────────────────────────────────────┐
        # │ USER MANAGEMENT - AUTENTICACIÓN                         │
        # └─────────────────────────────────────────────────────────┘

        # 3️⃣ UserManagement - Auth (DESPUÉS de rutas específicas de motel)
        - id: userManagement-auth
          uri: http://usermanagement-service:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0
          metadata:
            description: "Login, registro, etc."

        # 4️⃣ UserManagement - Profile
        - id: userManagement-profile
          uri: http://usermanagement-service:8081
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=0

        # ┌─────────────────────────────────────────────────────────┐
        # │ MOTEL MANAGEMENT - RUTAS PÚBLICAS                       │
        # └─────────────────────────────────────────────────────────┘

        # 5️⃣ Motel Management - Motels
        - id: motel-management-motels
          uri: http://motel-management-service:8083
          predicates:
            - Path=/api/motels/**
          filters:
            - StripPrefix=0

        # 6️⃣ Motel Management - Rooms
        - id: motel-management-rooms
          uri: http://motel-management-service:8083
          predicates:
            - Path=/api/rooms/**
          filters:
            - StripPrefix=0

        # 7️⃣ Motel Management - Services
        - id: motel-management-services
          uri: http://motel-management-service:8083
          predicates:
            - Path=/api/services/**
          filters:
            - StripPrefix=0

        # 8️⃣ Motel Management - Reservations
        - id: motel-reservations
          uri: http://motel-management-service:8083
          predicates:
            - Path=/api/reservations/**
          filters:
            - StripPrefix=0

      # ┌─────────────────────────────────────────────────────────┐
      # │ CONFIGURACIÓN DE PROXIES                                │
      # └─────────────────────────────────────────────────────────┘
      trusted-proxies: '127\.0\.0\.1|::1'