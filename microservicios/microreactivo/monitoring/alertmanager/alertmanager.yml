global:
  smtp_from: 'ubikApp3@gmail.com'
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_auth_username: 'ubikApp3@gmail.com'
  smtp_auth_password: 'mvndhobznradvbba'
  smtp_require_tls: true
  resolve_timeout: 5m

# ===========================================================
# PLANTILLAS DE NOTIFICACIÓN
# ===========================================================
# templates:
#   - '/etc/alertmanager/templates/*.tmpl'

# ===========================================================
# ÁRBOL DE ENRUTAMIENTO
# ===========================================================
route:
  # Receptor por defecto
  receiver: 'default-receiver'

  # Agrupar alertas del mismo servicio juntas
  group_by: ['alertname', 'service']
  group_wait: 30s        # Esperar antes de enviar el primer mensaje
  group_interval: 5m     # Esperar antes de enviar nuevas alertas del grupo
  repeat_interval: 4h    # Re-notificar si sigue activa

  routes:
    # ── Alertas críticas → notificación inmediata ──────────
    - match:
        severity: critical
      receiver: 'critical-receiver'
      group_wait: 10s
      repeat_interval: 1h
      continue: true   # También pasa al receptor padre

    # ── Payment Service → canal dedicado ──────────────────
    - match:
        service: payment
      receiver: 'payment-receiver'
      group_wait: 10s
      repeat_interval: 30m

    # ── Warnings → notificación normal ────────────────────
    - match:
        severity: warning
      receiver: 'warning-receiver'
      group_wait: 2m
      repeat_interval: 6h

# ===========================================================
# SILENCIO DE ALERTAS (mantenimiento)
# ===========================================================
inhibit_rules:
  # Si el servicio está caído, no notificar errores de ese servicio
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: 'HighErrorRate|SlowResponseTime'
    equal: ['service']

# ===========================================================
# RECEPTORES
# ===========================================================
receivers:

  - name: 'default-receiver'
    email_configs:
      - to: 'ubikApp3@gmail.com'
        headers:
          Subject: '[Ubik][{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        html: |
          {{ range .Alerts }}
          <b>Alerta:</b> {{ .Annotations.summary }}<br>
          <b>Descripción:</b> {{ .Annotations.description }}<br>
          <b>Servicio:</b> {{ .Labels.service }}<br>
          <b>Severidad:</b> {{ .Labels.severity }}<br>
          <hr>
          {{ end }}

  - name: 'critical-receiver'
    email_configs:
      - to: 'ubikApp3@gmail.com'
        headers:
          Subject: '[CRITICO] {{ .GroupLabels.alertname }} - {{ .GroupLabels.service }}'
        send_resolved: true

  - name: 'payment-receiver'
    email_configs:
      - to: 'ubikApp3@gmail.com'
        headers:
          Subject: '[PAGOS] {{ .GroupLabels.alertname }}'
        send_resolved: true

  - name: 'warning-receiver'
    email_configs:
      - to: 'ubikApp3@gmail.com'
        headers:
          Subject: '[WARNING] {{ .GroupLabels.alertname }} - {{ .GroupLabels.service }}'
        send_resolved: true