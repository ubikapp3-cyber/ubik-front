version: "3.8"

services:
  # =========================
  # API GATEWAY (ÚNICO ENTRYPOINT)
  # =========================
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: microreactivo-gateway
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
    ports:
      - "8080:8080"   # SOLO EL GATEWAY ES PÚBLICO
    networks:
      - microreactivo-network
    restart: unless-stopped
    depends_on:
      usermanagement-service:
        condition: service_healthy
      motel-management-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # =========================
  # USER MANAGEMENT SERVICE
  # =========================
  usermanagement-service:
    build:
      context: .
      dockerfile: userManagement/Dockerfile
    container_name: microreactivo-usermanagement
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_R2DBC_URL: ${SPRING_R2DBC_URL}
      SPRING_R2DBC_USERNAME: ${SPRING_R2DBC_USERNAME}
      SPRING_R2DBC_PASSWORD: ${SPRING_R2DBC_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
    expose:
      - "8081"   # SOLO INTERNO
    networks:
      - microreactivo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # =========================
  # MOTEL MANAGEMENT SERVICE
  # =========================
  motel-management-service:
    build:
      context: .
      dockerfile: motelManegement/Dockerfile
    container_name: microreactivo-motel-management
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_R2DBC_URL: ${SPRING_R2DBC_URL}
      SPRING_R2DBC_USERNAME: ${SPRING_R2DBC_USERNAME}
      SPRING_R2DBC_PASSWORD: ${SPRING_R2DBC_PASSWORD}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    expose:
      - "8083"   # SOLO INTERNO
    networks:
      - microreactivo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

# =========================
# NETWORK
# =========================
networks:
  microreactivo-network:
    driver: bridge
